name: CI

# Runs on PRs into main, inside the merge queue (so each PR is re-tested against
# the latest main right before it lands), and on direct pushes to main.
on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]

# A newer commit on the same ref cancels the older, still-running check.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ui-server:
    name: ui/server — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Tests
        run: npm test

  ui-web:
    name: ui/web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build (vite build)
        run: npm run build
