name: CI

# Runs on every PR AND inside the merge queue (merge_group). The merge_group trigger is what makes the
# queue re-test each PR against the LATEST main right before it merges — so "main moved while my PR was
# open" can never land a broken main. Make the `server` job a REQUIRED status check in branch protection.
on:
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: ui/server — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/server/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests (auto-discovered)
        run: npm test
      - name: Security audit (informational — tighten to required once clean)
        run: npm audit --audit-level=high
        continue-on-error: true
